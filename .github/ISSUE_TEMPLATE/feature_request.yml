name: ✨ 功能建议 / Feature Request
description: 提议新功能、改进或重构方向
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议！请先确认这个功能符合本项目"仅供学习交流"的定位（详见 LICENSE）。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能要解决什么问题？现状的痛点是什么？
      placeholder: 例如：现在添加新地图必须手动改 5 个文件且无校验，容易出错
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么解决？可以包含 API 设计、UI 草图、伪代码等
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 还想过哪些做法？为什么觉得本提议更好？

  - type: dropdown
    id: scope
    attributes:
      label: 改动范围
      options:
        - 小（单文件、单方法）
        - 中（多文件、单模块）
        - 大（跨模块、协议改动）
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: 是否破坏兼容性
      options:
        - 否，纯增量
        - 可能影响序列化数据兼容性
        - 可能影响网络协议兼容性
        - 影响存档/数据库格式
        - 不确定
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充说明
      description: 截图、参考链接、相关 Issue 编号等

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 已搜索 Issues 确认无重复提议
          required: true
        - label: 这个功能与项目的"学习与技术研究"定位一致（非纯商业需求）
          required: true
